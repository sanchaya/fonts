version: "3.9"

services:

  public_html:
    build: .
    container_name: public_html
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD","wget","--spider","http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
